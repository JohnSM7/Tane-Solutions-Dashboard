name: Deploy Supabase Edge Functions

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Supabase CLI
        run: npm install -g supabase@latest

      - name: Verify secrets present
        run: |
          if [ -z "$TOKEN" ]; then echo "ERROR: SUPABASE_ACCESS_TOKEN secret is empty"; exit 1; fi
          if [ -z "$RESEND" ]; then echo "ERROR: RESEND_API_KEY secret is empty"; exit 1; fi
          echo "Secrets OK"
        env:
          TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          RESEND: ${{ secrets.RESEND_API_KEY }}

      - name: Set Resend API Key secret
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase secrets set RESEND_API_KEY="${{ secrets.RESEND_API_KEY }}" \
            --project-ref idogljsfqunkvmvvnyrx

      - name: Deploy send-email function
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy send-email \
            --project-ref idogljsfqunkvmvvnyrx \
            --no-verify-jwt
