name: Deploy Supabase Edge Functions

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Supabase CLI
        run: |
          curl -sL https://github.com/supabase/cli/releases/latest/download/supabase_linux_amd64.tar.gz \
            | tar -xz -C /usr/local/bin supabase
          supabase --version

      - name: Set Resend API Key secret
        run: |
          supabase secrets set RESEND_API_KEY="re_digmYSnx_MTMP6941TZ8xauL8MABURJxo" \
            --project-ref idogljsfqunkvmvvnyrx
        env:
          SUPABASE_ACCESS_TOKEN: sbp_cd9d1714644640ecf53732c4ac1b51e82550fa9b

      - name: Deploy send-email function
        run: |
          supabase functions deploy send-email \
            --project-ref idogljsfqunkvmvvnyrx \
            --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: sbp_cd9d1714644640ecf53732c4ac1b51e82550fa9b
