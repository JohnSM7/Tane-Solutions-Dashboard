name: Deploy Supabase Edge Functions

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Supabase CLI
        run: |
          curl -sL https://github.com/supabase/cli/releases/latest/download/supabase_linux_amd64.tar.gz \
            | tar -xz -C /usr/local/bin supabase
          supabase --version

      - name: Deploy send-email function
        run: |
          supabase functions deploy send-email \
            --project-ref idogljsfqunkvmvvnyrx \
            --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: sbp_352c8663c4a802ea833eecc7f822833a3326749e
