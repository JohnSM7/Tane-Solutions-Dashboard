name: Deploy Supabase Edge Functions

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Supabase CLI
        run: npm install -g supabase@latest

      - name: Set Resend API Key secret
        run: |
          supabase secrets set RESEND_API_KEY="re_digmYSnx_MTMP6941TZ8xauL8MABURJxo" \
            --project-ref idogljsfqunkvmvvnyrx
        env:
          SUPABASE_ACCESS_TOKEN: sbp_bfab408ee693aac663e8f304cb07014aea1a553a

      - name: Deploy send-email function
        run: |
          supabase functions deploy send-email \
            --project-ref idogljsfqunkvmvvnyrx \
            --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: sbp_bfab408ee693aac663e8f304cb07014aea1a553a
